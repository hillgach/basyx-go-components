services:
  db_it:
    image: postgres:18
    container_name: postgres_db_it_env
    environment:
      POSTGRES_USER: admin
      POSTGRES_PASSWORD: admin123
      POSTGRES_DB: basyxTestDB
    command: ["postgres", "-c", "listen_addresses=*"]
    ports:
      - "6432:5432"
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U admin -d basyxTestDB"]
      interval: 10s
      timeout: 5s
      retries: 5

  aas_repository_it:
    build:
      context: ../../../..
      dockerfile: ./cmd/aasrepositoryservice/Dockerfile
    environment:
      - SERVER_PORT=5004
      - POSTGRES_HOST=db_it
      - POSTGRES_PORT=5432
      - POSTGRES_USER=admin
      - POSTGRES_PASSWORD=admin123
      - POSTGRES_DBNAME=basyxTestDB
      - POSTGRES_MAXOPENCONNECTIONS=500
      - POSTGRES_MAXIDLECONNECTIONS=500
      - POSTGRES_CONNMAXLIFETIMEMINUTES=5
      - SERVER_STRICTVERIFICATION=false
    ports:
      - "6004:5004"
    depends_on:
      db_it:
        condition: service_healthy

  submodel_repository_it:
    build:
      context: ../../../..
      dockerfile: ./cmd/submodelrepositoryservice/Dockerfile
    environment:
      - SERVER_PORT=5003
      - POSTGRES_HOST=db_it
      - POSTGRES_PORT=5432
      - POSTGRES_USER=admin
      - POSTGRES_PASSWORD=admin123
      - POSTGRES_DBNAME=basyxTestDB
      - POSTGRES_MAXOPENCONNECTIONS=500
      - POSTGRES_MAXIDLECONNECTIONS=500
      - POSTGRES_CONNMAXLIFETIMEMINUTES=5
      - SERVER_STRICTVERIFICATION=false
    ports:
      - "6003:5003"
    depends_on:
      db_it:
        condition: service_healthy

  aas_environment_it:
    build:
      context: ../../../..
      dockerfile: ./cmd/aasenvironmentservice/Dockerfile
    environment:
      - SERVER_PORT=5007
      - POSTGRES_HOST=db_it
      - POSTGRES_PORT=5432
      - POSTGRES_USER=admin
      - POSTGRES_PASSWORD=admin123
      - POSTGRES_DBNAME=basyxTestDB
      - POSTGRES_MAXOPENCONNECTIONS=500
      - POSTGRES_MAXIDLECONNECTIONS=500
      - POSTGRES_CONNMAXLIFETIMEMINUTES=5
      - SERVER_STRICTVERIFICATION=false
    ports:
      - "6007:5007"
    depends_on:
      db_it:
        condition: service_healthy
